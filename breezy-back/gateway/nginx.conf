events {}

http {
    client_max_body_size 110M;

    upstream api_upstream {
        server api:3000;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
