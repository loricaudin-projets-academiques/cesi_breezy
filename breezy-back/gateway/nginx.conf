events {}

http {
    upstream api_upstream {
        server api:3000;
    }

    upstream auth_upstream {
        server auth:3001;
    }

    server {
        listen 80;

        # Les routes /api/auth/* sont gérées par le auth-service
        # Ce bloc doit être AVANT /api/ pour que le matching plus précis s'applique
        location /api/auth/ {
            proxy_pass http://auth_upstream/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Toutes les autres routes /api/* vont vers l'api-service
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
