services:
  api:
    container_name: breezy-back-api
    build:
      context: ./breezy-back/api-service
      dockerfile: dockerfile
    ports:
      - "3000"
    command: npm run dev
    volumes:
      - ./breezy-back/api-service:/api
  
  api_gateway:
    image: nginx:latest
    container_name: api_gateway
    ports:
      - "80:80"
    volumes:
      - ./breezy-back/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
