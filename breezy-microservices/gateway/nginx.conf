events {}

http {
    client_max_body_size 30m;

    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream api_upstream {
        server api:3000;
    }

    upstream auth_upstream {
        server auth:3000;
    }

    upstream user_upstream {
        server user:3000;
    }

    upstream media_upstream {
        server media:3000;
    }

    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://auth_upstream/;
        }

        location /api/users/ {
            proxy_pass http://user_upstream/;
        }

        location /api/media/ {
            proxy_pass http://media_upstream/;
        }

        location /api/ {
            proxy_pass http://api_upstream/;
        }

        location /uploads/ {
            proxy_pass http://media_upstream/uploads/;
        }

        # Next.js HMR websocket (hot reload en dev)
        location /_next/webpack-hmr {
            proxy_pass http://frontend_upstream/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Tout le reste → frontend Next.js
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
